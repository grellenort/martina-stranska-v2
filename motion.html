<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Motion design</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-light bg-light">
    <div class="container">
        <a href="index.html" class="navbar-brand">← Zpět</a>
    </div>
</nav>

<section class="py-5">
    <div class="container">
        <h1>Motion design</h1>
    </div>
</section>

<!-- ================= portfilio ================= -->
<section class="portfolio-grid">
    <div class="container-fluid p-0">
        <div class="row g-0">

            <div class="col-12 col-md-4">
                <div class="portfolio-item"
                     data-bs-toggle="modal"
                     data-bs-target="#videoModal"
                     data-video="https://www.youtube.com/embed/mXEh0DKT2F0">
                    <img src="assets/IMG_videa/MAXARA.00_00_27_20.Still001.jpg" alt="">
                    <span class="play-icon"></span>
                </div>
            </div>

            <div class="col-12 col-md-4">
    <div class="portfolio-item"
         data-bs-toggle="modal"
         data-bs-target="#videoModal"
         data-video="https://www.youtube.com/embed/5uEpXH9txeI">
        <img src="assets/IMG_videa/404.jpg" alt="">
        <span class="play-icon"></span>
    </div>
</div>


            <div class="col-12 col-md-4">
                <div class="portfolio-item"
                     data-bs-toggle="modal"
                     data-bs-target="#videoModal"
                     data-video="https://www.youtube.com/embed/VIDEO_ID_3">
                    <img src="assets/IMG_videa/VIDEO3.jpg" alt="">
                    <span class="play-icon"></span>
                </div>
            </div>

        </div>
    </div>
</section>






<!-- ================VIDEO LIGHTBOX=  ================= -->

<div class="modal fade" id="videoModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content bg-black border-0">

            <div class="ratio ratio-16x9">
                <iframe id="videoFrame"
                        src=""
                        allow="autoplay; fullscreen"
                        allowfullscreen>
                </iframe>
            </div>

        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const videoModal = document.getElementById('videoModal');
const iframe = document.getElementById('videoFrame');

videoModal.addEventListener('show.bs.modal', event => {
    const trigger = event.relatedTarget;
    const videoUrl = trigger.getAttribute('data-video');
    iframe.src = videoUrl + '?autoplay=1';
});

videoModal.addEventListener('hidden.bs.modal', () => {
    iframe.src = '';
});
</script>


</body>
</html>
